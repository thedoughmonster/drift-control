<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta
      name="description"
      content="Public handbook for establishing drift control in any repository."
    >
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    >
    <meta name="theme-color" content="#0f1720">
    <title>Drift Control Handbook</title>
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    >
    <style>
      :root {
        --theme-color: #147d73;
        --dc-bg: #f3f6f7;
        --dc-bg-elevated: rgba(255, 255, 255, 0.94);
        --dc-bg-soft: rgba(238, 245, 246, 0.82);
        --dc-text: #13242a;
        --dc-text-soft: #4d6871;
        --dc-heading: #0a3d3a;
        --dc-heading-soft: #0e655d;
        --dc-border: rgba(151, 176, 184, 0.28);
        --dc-accent: #147d73;
        --dc-accent-strong: #0e655d;
        --dc-code-bg: #eaf2f4;
        --dc-code-border: rgba(75, 108, 117, 0.22);
        --dc-shadow: 0 24px 70px rgba(12, 28, 33, 0.08);
        --dc-sidebar-width: 272px;
        --dc-outline-width: 280px;
        --dc-navbar-height: 64px;
      }

      :root.theme-dark {
        --theme-color: #67dbc8;
        --dc-bg: #0f1720;
        --dc-bg-elevated: #141d25;
        --dc-bg-soft: #18222c;
        --dc-text: #e7f3f5;
        --dc-text-soft: #9fb7be;
        --dc-heading: #ffffff;
        --dc-heading-soft: #dffaf5;
        --dc-border: rgba(120, 151, 163, 0.24);
        --dc-accent: #67dbc8;
        --dc-accent-strong: #91efe0;
        --dc-code-bg: #111a22;
        --dc-code-border: rgba(151, 203, 215, 0.18);
        --dc-shadow: 0 28px 70px rgba(0, 0, 0, 0.32);
      }

      @media (prefers-color-scheme: dark) {
        :root:not(.theme-light) {
          --theme-color: #67dbc8;
          --dc-bg: #0f1720;
          --dc-bg-elevated: #141d25;
          --dc-bg-soft: #18222c;
          --dc-text: #e7f3f5;
          --dc-text-soft: #9fb7be;
          --dc-heading: #ffffff;
          --dc-heading-soft: #dffaf5;
          --dc-border: rgba(120, 151, 163, 0.24);
          --dc-accent: #67dbc8;
          --dc-accent-strong: #91efe0;
          --dc-code-bg: #111a22;
          --dc-code-border: rgba(151, 203, 215, 0.18);
          --dc-shadow: 0 28px 70px rgba(0, 0, 0, 0.32);
        }
      }

      * {
        box-sizing: border-box;
      }

      body,
      .content,
      .sidebar,
      .topbar,
      .page-outline,
      .markdown-section,
      .search input,
      .search .results-panel,
      .theme-toggle,
      .page-sequence__card {
        transition: background-color 160ms ease, color 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      }

      body {
        margin: 0;
        background: var(--dc-bg);
        color: var(--dc-text);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(20, 125, 115, 0.07), transparent 22rem),
          radial-gradient(circle at 14% 10%, rgba(20, 125, 115, 0.14), transparent 34rem),
          radial-gradient(circle at 82% 18%, rgba(20, 125, 115, 0.08), transparent 42rem);
        background-repeat: no-repeat;
        background-size: cover, cover, cover;
        background-position: center top, left top, right top;
      }

      :root.theme-dark body::before {
        background: none;
      }

      @media (prefers-color-scheme: dark) {
        :root:not(.theme-light) body::before {
          background: none;
        }
      }

      .topbar__brand,
      .topbar__nav a,
      .sidebar-nav a,
      .markdown-section a,
      .page-outline__nav a,
      .page-sequence__card,
      .theme-toggle,
      .docsify-copy-code-button {
        transition: color 160ms ease, background-color 160ms ease, border-color 160ms ease, transform 160ms ease;
      }

      .topbar {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        gap: 0.9rem;
        height: var(--dc-navbar-height);
        padding: 0 1rem;
        background: var(--dc-bg-elevated);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--dc-border);
        box-shadow: var(--dc-shadow);
      }

      .topbar__brand {
        color: var(--dc-text);
        text-decoration: none;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .topbar__nav {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
        position: static !important;
        inset: auto !important;
        margin: 0 !important;
        width: auto !important;
        pointer-events: none;
      }

      .topbar__nav a {
        pointer-events: auto;
      }

      .topbar__nav a {
        color: var(--dc-text-soft);
        text-decoration: none;
        font-size: 0.91rem;
        font-weight: 600;
      }

      .topbar__nav a:hover,
      .topbar__nav a.active,
      .topbar__brand:hover,
      .sidebar-nav a:hover,
      .sidebar-nav li.active > a,
      .page-outline__nav a:hover,
      .page-outline__nav a.is-active,
      .markdown-section a:hover {
        color: var(--dc-accent-strong);
      }

      .theme-toggle {
        position: fixed;
        right: 1.25rem;
        bottom: 1.25rem;
        z-index: 60;
        border: 1px solid var(--dc-border);
        border-radius: 999px;
        background: var(--dc-bg-soft);
        color: var(--dc-text);
        box-shadow: var(--dc-shadow);
        padding: 0.5rem 0.82rem;
        font: 700 0.75rem/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: pointer;
      }

      .theme-toggle:hover {
        color: var(--dc-accent-strong);
      }

      .sidebar {
        top: var(--dc-navbar-height);
        width: var(--dc-sidebar-width);
        padding-top: 0.95rem;
        background: transparent;
        border-right: 0;
      }

      .search {
        margin: 0 0.75rem 0.72rem;
        padding: 0.62rem 0.72rem;
        background: var(--dc-bg-elevated);
        border: 1px solid var(--dc-border);
        border-radius: 1rem;
        box-shadow: var(--dc-shadow);
      }

      .search input,
      .search .results-panel {
        background: var(--dc-bg-soft);
        color: var(--dc-text);
        border: 1px solid var(--dc-border);
        border-radius: 0.8rem;
      }

      .search input {
        padding: 0.64rem 0.78rem;
        font-size: 0.9rem;
      }

      .search input::placeholder {
        color: var(--dc-text-soft);
      }

      .search .results-panel {
        margin-top: 0.6rem;
        box-shadow: var(--dc-shadow);
      }

      .sidebar-nav {
        margin: 0 0.75rem 0.95rem;
        padding: 0.78rem 0.72rem;
        background: var(--dc-bg-elevated);
        border: 1px solid var(--dc-border);
        border-radius: 1rem;
        box-shadow: var(--dc-shadow);
      }

      .sidebar-nav > ul > li {
        margin: 0 0 0.58rem;
        color: var(--dc-text-soft);
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .sidebar-nav > ul > li > a {
        font-size: 0.78rem;
        line-height: 1.2;
      }

      .sidebar-nav ul li a {
        color: var(--dc-text);
      }

      .sidebar-nav ul li ul li a {
        display: block;
        padding: 0.3rem 0.42rem;
        margin: 0 0 0.12rem;
        border-radius: 0.6rem;
        font-size: 0.87rem;
        line-height: 1.24;
      }

      .sidebar-nav ul li.active > ul > li.active > a,
      .sidebar-nav ul li ul li a:hover {
        background: var(--dc-bg-soft);
      }

      .content {
        left: var(--dc-sidebar-width);
        right: 0;
        top: var(--dc-navbar-height);
        padding: 1.35rem 1.5rem 3.5rem;
        background: transparent;
      }

      .markdown-section {
        max-width: 900px;
        margin: 0;
        padding: 1.85rem 2.2rem 2.35rem;
        color: var(--dc-text);
        background: var(--dc-bg-elevated);
        border: 1px solid var(--dc-border);
        border-radius: 1.25rem;
        box-shadow: var(--dc-shadow);
      }

      .markdown-section p,
      .markdown-section li,
      .markdown-section td,
      .markdown-section th,
      .markdown-section strong {
        color: var(--dc-text);
      }

      .markdown-section h1,
      .markdown-section h2,
      .markdown-section h3,
      .markdown-section h4,
      .markdown-section h5,
      .markdown-section h6 {
        color: var(--dc-heading);
      }

      .markdown-section h1 a,
      .markdown-section h2 a,
      .markdown-section h3 a,
      .markdown-section h4 a,
      .markdown-section h5 a,
      .markdown-section h6 a {
        color: inherit;
      }

      .markdown-section h1 *,
      .markdown-section h2 *,
      .markdown-section h3 *,
      .markdown-section h4 *,
      .markdown-section h5 *,
      .markdown-section h6 * {
        color: inherit;
      }

      .markdown-section h1 {
        margin: 0 0 1rem;
        color: var(--dc-heading);
        font-size: clamp(1.95rem, 4.2vw, 2.55rem);
        line-height: 1.06;
        letter-spacing: -0.04em;
        font-weight: 800;
      }

      .markdown-section h2 {
        margin: 2rem 0 0.8rem;
        color: var(--dc-heading);
        font-size: 1.42rem;
        line-height: 1.14;
        letter-spacing: -0.03em;
        font-weight: 760;
      }

      .markdown-section h3 {
        margin: 1.4rem 0 0.55rem;
        color: var(--dc-heading);
        font-size: 1.14rem;
        line-height: 1.2;
        font-weight: 760;
        letter-spacing: -0.01em;
      }

      :root.theme-dark .markdown-section h1,
      :root.theme-dark .markdown-section h2,
      :root.theme-dark .markdown-section h3 {
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.28);
      }

      @media (prefers-color-scheme: dark) {
        :root:not(.theme-light) .markdown-section h1,
        :root:not(.theme-light) .markdown-section h2,
        :root:not(.theme-light) .markdown-section h3 {
          text-shadow: 0 1px 0 rgba(0, 0, 0, 0.28);
        }
      }

      .markdown-section p,
      .markdown-section li,
      .markdown-section td {
        font-size: 0.97rem;
        line-height: 1.58;
      }

      .markdown-section table {
        display: table;
        width: 100%;
        table-layout: fixed;
        overflow: hidden;
        border-collapse: separate;
        border-spacing: 0;
        background: var(--dc-bg-soft);
        border: 1px solid var(--dc-border);
        border-radius: 1rem;
      }

      .markdown-section tr:nth-child(2n) {
        background: transparent;
      }

      .markdown-section th,
      .markdown-section td {
        border-color: var(--dc-border);
        min-width: 0;
        white-space: normal;
        word-break: break-word;
        vertical-align: top;
      }

      .markdown-section th {
        color: var(--dc-heading);
        font-size: 0.8rem;
        letter-spacing: 0.03em;
      }

      .markdown-section blockquote {
        margin: 1.1rem 0;
        padding: 0.85rem 1rem;
        border-left: 4px solid var(--dc-accent);
        border-radius: 0.8rem;
        background: var(--dc-bg-soft);
      }

      .markdown-section pre,
      .markdown-section code {
        background: var(--dc-code-bg);
      }

      .markdown-section hr {
        margin: 1.5rem 0;
        border: 0;
        border-top: 1px solid var(--dc-border);
      }

      .markdown-section pre {
        position: relative;
        max-width: 100%;
        padding: 0.95rem 0.95rem 0.85rem;
        overflow: hidden !important;
        overflow-x: hidden !important;
        border: 1px solid var(--dc-code-border);
        border-radius: 1rem;
        box-shadow: var(--dc-shadow);
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .markdown-section pre > code {
        background: transparent;
        display: block;
        white-space: pre-wrap !important;
        word-break: break-word;
        overflow-wrap: anywhere;
        overflow-x: hidden !important;
      }

      .markdown-section td,
      .markdown-section th,
      .markdown-section code,
      .markdown-section a {
        overflow-wrap: anywhere;
      }

      .markdown-section pre::-webkit-scrollbar,
      .markdown-section table::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      .markdown-section ul,
      .markdown-section ol {
        padding-left: 1.15rem;
      }

      .markdown-section li + li {
        margin-top: 0.2rem;
      }

      .docsify-copy-code-button {
        right: 0.75rem !important;
        top: 0.68rem !important;
        padding: 0.35rem 0.65rem !important;
        border: 1px solid var(--dc-border) !important;
        border-radius: 999px !important;
        background: var(--dc-bg-elevated) !important;
        color: var(--dc-text-soft) !important;
        font-size: 0.75rem !important;
        font-weight: 700 !important;
      }

      .docsify-copy-code-button .error,
      .docsify-copy-code-button .success {
        display: none !important;
      }

      .docsify-copy-code-button.error .label,
      .docsify-copy-code-button.success .label {
        display: none !important;
      }

      .docsify-copy-code-button.error .error,
      .docsify-copy-code-button.success .success {
        display: inline !important;
      }

      .docsify-copy-code-button:hover {
        color: var(--dc-accent-strong) !important;
        transform: translateY(-1px);
      }

      .markdown-section .mermaid {
        margin: 1.5rem 0;
        padding: 1rem;
        background: var(--dc-bg-soft);
        border: 1px solid var(--dc-border);
        border-radius: 1rem;
        overflow-x: auto;
      }

      .page-outline {
        position: fixed;
        top: calc(var(--dc-navbar-height) + 1.4rem);
        right: 1.25rem;
        width: var(--dc-outline-width);
        max-height: calc(100vh - var(--dc-navbar-height) - 2rem);
        overflow: auto;
        padding: 0.85rem;
        background: var(--dc-bg-elevated);
        border: 1px solid var(--dc-border);
        border-radius: 1rem;
        box-shadow: var(--dc-shadow);
        display: none;
      }

      .page-outline.is-visible {
        display: block;
      }

      .page-outline__eyebrow {
        margin: 0 0 0.65rem;
        color: var(--dc-text-soft);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .page-outline__nav {
        display: flex;
        flex-direction: column;
        gap: 0.16rem;
      }

      .page-outline__nav a {
        display: block;
        color: var(--dc-text-soft);
        padding: 0.3rem 0.42rem;
        border-left: 2px solid transparent;
        font-size: 0.84rem;
        line-height: 1.28;
      }

      .page-outline__nav a.level-h3 {
        margin-left: 0.8rem;
        font-size: 0.82rem;
      }

      .page-outline__nav a.is-active {
        color: var(--dc-accent-strong);
        border-left-color: var(--dc-accent);
        background: var(--dc-bg-soft);
      }

      .page-sequence {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.85rem;
        margin-top: 1.75rem;
      }

      .page-sequence__card {
        display: block;
        min-height: 96px;
        padding: 0.9rem 0.95rem;
        background: var(--dc-bg-soft);
        border: 1px solid var(--dc-border);
        border-radius: 1rem;
        color: var(--dc-text);
        text-decoration: none;
      }

      .page-sequence__card:hover {
        transform: translateY(-2px);
        border-color: rgba(20, 125, 115, 0.35);
        box-shadow: var(--dc-shadow);
      }

      .page-sequence__direction {
        display: block;
        margin-bottom: 0.42rem;
        color: var(--dc-text-soft);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .page-sequence__title {
        display: block;
        margin-bottom: 0.26rem;
        color: var(--dc-text);
        font-size: 0.95rem;
        font-weight: 700;
      }

      .page-sequence__description {
        color: var(--dc-text-soft);
        font-size: 0.85rem;
        line-height: 1.35;
      }

      .sidebar-toggle {
        top: calc(var(--dc-navbar-height) + 0.75rem);
        display: none;
      }

      @media screen and (min-width: 1380px) {
        .content {
          right: calc(var(--dc-outline-width) + 2rem);
        }
      }

      @media screen and (max-width: 1199px) {
        .page-outline {
          display: none !important;
        }

        .content {
          right: 0;
        }
      }

      @media screen and (max-width: 959px) {
        .topbar {
          padding-left: 4rem;
          padding-right: 1rem;
        }

        .markdown-section {
          padding: 1.5rem 1.2rem 1.8rem;
        }
      }

      @media screen and (max-width: 768px) {
        .sidebar-toggle {
          display: block;
        }

        .topbar {
          height: auto;
          min-height: var(--dc-navbar-height);
          flex-wrap: wrap;
          padding-top: 0.85rem;
          padding-bottom: 0.85rem;
        }

        .topbar__nav {
          width: 100%;
          flex-wrap: wrap;
          gap: 0.7rem;
        }

        .theme-toggle {
          right: 1rem;
          bottom: 1rem;
        }

        .sidebar {
          top: 0;
        }

        .content {
          left: 0;
          top: calc(var(--dc-navbar-height) + 1.8rem);
          padding: 0.85rem;
        }

        .markdown-section {
          overflow-x: clip;
        }

        .markdown-section th,
        .markdown-section td {
          min-width: 0;
          white-space: normal;
          word-break: break-word;
        }

        .markdown-section code {
          white-space: break-spaces;
          word-break: break-word;
        }

        .markdown-section pre {
          overflow-x: clip;
        }

        .markdown-section pre code {
          white-space: pre-wrap;
          word-break: break-word;
        }

        .page-sequence {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="topbar__brand" href="#/README">Drift Control Handbook</a>
      <nav class="topbar__nav" aria-label="Primary">
        <a href="#/README" data-nav-path="/README">Home</a>
        <a href="#/core-model" data-nav-path="/core-model">Guide</a>
        <a href="#/code-index-template" data-nav-path="/code-index-template">Templates</a>
        <a href="https://github.com/thedoughmonster/drift-control" target="_blank" rel="noreferrer">GitHub</a>
      </nav>
    </header>
    <div id="app"></div>
    <button class="theme-toggle" type="button">Dark mode</button>
    <script>
      (function () {
        var storedTheme = localStorage.getItem("drift-control-theme");
        if (storedTheme === "dark") {
          document.documentElement.classList.add("theme-dark");
        } else if (storedTheme === "light") {
          document.documentElement.classList.add("theme-light");
        }
      })();
    </script>
    <script>
      (function () {
        var pageOrder = [
          {
            path: "/README",
            label: "Home",
            description: "Introduction, reading paths, and the guide structure."
          },
          {
            path: "/core-model",
            label: "Core Model",
            description: "What drift control is and how the model stays aligned."
          },
          {
            path: "/minimum-viable-implementation",
            label: "Minimum Viable Implementation",
            description: "The baseline controls required before the model is credible."
          },
          {
            path: "/enforcement-model",
            label: "Enforcement Model",
            description: "Layered enforcement and the control matrix."
          },
          {
            path: "/implementation-guide",
            label: "Implementation Guide",
            description: "Rollout order, operational patterns, and long-run adoption."
          },
          {
            path: "/code-index-template",
            label: "Code Index Template",
            description: "Build an index-first retrieval layer with local query surfaces."
          },
          {
            path: "/canon-authority-template",
            label: "Canon Authority Template",
            description: "Define a central source of semantic authority and generated publication surfaces."
          },
          {
            path: "/ci-integration-template",
            label: "CI Integration Template",
            description: "Turn drift-control rules into merge-blocking automation and determinism checks."
          },
          {
            path: "/tempgo-protocol-template",
            label: "Tempgo Protocol Template",
            description: "Run bounded workstreams with step-list authority, seam audits, and resumable state."
          },
          {
            path: "/reference-implementation-example",
            label: "Reference Implementation Example",
            description: "Optional concrete mapping of the model to one repository family."
          }
        ];

        var outlineObserver;
        var copyButtonObserver;

        function getCurrentPath() {
          var hash = window.location.hash || "#/README";
          var route = hash.replace(/^#/, "");
          var path = route.split("?")[0];
          if (!path || path === "/") return "/README";
          return path;
        }

        function getBaseHash() {
          return "#" + getCurrentPath();
        }

        function ensureThemeToggle() {
          var button = document.querySelector(".theme-toggle");
          if (!button || button.dataset.ready === "true") {
            if (button) applyTheme(getTheme());
            return;
          }
          button.dataset.ready = "true";
          button.addEventListener("click", function () {
            applyTheme(getTheme() === "dark" ? "light" : "dark");
          });
          applyTheme(getTheme());
        }

        function normalizeTopbarNav() {
          var nav = document.querySelector(".topbar__nav");
          if (!nav) return;
          nav.classList.remove("app-nav", "no-badge");
          nav.style.position = "static";
          nav.style.inset = "auto";
          nav.style.margin = "0";
          nav.style.width = "auto";
        }

        function getTheme() {
          if (document.documentElement.classList.contains("theme-dark")) return "dark";
          if (document.documentElement.classList.contains("theme-light")) return "light";
          return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        function applyTheme(theme) {
          document.documentElement.classList.remove("theme-dark", "theme-light");
          document.documentElement.classList.add(theme === "dark" ? "theme-dark" : "theme-light");
          localStorage.setItem("drift-control-theme", theme);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", theme === "dark" ? "#0f1720" : "#f3f6f7");
          var button = document.querySelector(".theme-toggle");
          if (button) button.textContent = theme === "dark" ? "Light mode" : "Dark mode";
          window.requestAnimationFrame(renderMermaid);
        }

        function renderMermaid() {
          if (!window.mermaid) return;

          window.mermaid.initialize({
            startOnLoad: false,
            securityLevel: "loose",
            theme: getTheme() === "dark" ? "dark" : "neutral"
          });

          var section = document.querySelector(".markdown-section");
          if (!section) return;

          Array.prototype.slice.call(
            section.querySelectorAll('pre[data-lang="mermaid"], pre code.language-mermaid')
          ).forEach(function (node) {
            var pre = node.tagName === "PRE" ? node : node.parentElement;
            if (!pre || pre.dataset.mermaidReady === "true") return;
            var code = pre.querySelector("code");
            var source = code ? code.textContent : pre.textContent;
            var wrapper = document.createElement("div");
            wrapper.className = "mermaid";
            wrapper.dataset.source = source;
            wrapper.textContent = source;
            pre.dataset.mermaidReady = "true";
            pre.replaceWith(wrapper);
          });

          window.mermaid.run({
            nodes: Array.prototype.slice.call(section.querySelectorAll(".mermaid[data-source]")).map(function (node) {
              node.innerHTML = node.dataset.source;
              node.removeAttribute("data-processed");
              return node;
            })
          });
        }

        function normalizeCopyButtons() {
          document.querySelectorAll(".docsify-copy-code-button").forEach(function (button) {
            var error = button.querySelector(".error");
            var success = button.querySelector(".success");
            if (error) error.remove();
            if (success) success.remove();
          });
        }

        function ensureCopyButtonObserver() {
          if (copyButtonObserver) return;
          copyButtonObserver = new MutationObserver(function () {
            normalizeCopyButtons();
          });
          copyButtonObserver.observe(document.body, {
            childList: true,
            subtree: true
          });
        }

        function ensureOutline() {
          var outline = document.querySelector(".page-outline");
          if (outline) return outline;
          outline = document.createElement("aside");
          outline.className = "page-outline";
          outline.innerHTML = [
            '<p class="page-outline__eyebrow">On this page</p>',
            '<nav class="page-outline__nav"></nav>'
          ].join("");
          document.body.appendChild(outline);
          return outline;
        }

        function renderOutline() {
          var outline = ensureOutline();
          var nav = outline.querySelector(".page-outline__nav");
          var section = document.querySelector(".markdown-section");
          if (!section || !nav) return;

          var headings = Array.prototype.slice.call(section.querySelectorAll("h2, h3")).filter(function (heading) {
            return heading.id && heading.textContent.trim();
          });

          if (!headings.length || window.innerWidth < 1200) {
            nav.innerHTML = "";
            outline.classList.remove("is-visible");
            if (outlineObserver) outlineObserver.disconnect();
            return;
          }

          nav.innerHTML = headings.map(function (heading) {
            var level = heading.tagName.toLowerCase();
            return (
              '<a class="level-' + level + '" href="' +
              getBaseHash() + "?id=" + encodeURIComponent(heading.id) +
              '" data-target="' + heading.id + '">' +
              heading.textContent +
              "</a>"
            );
          }).join("");

          outline.classList.add("is-visible");
          if (outlineObserver) outlineObserver.disconnect();
          outlineObserver = new IntersectionObserver(
            function (entries) {
              entries.forEach(function (entry) {
                var link = nav.querySelector('[data-target="' + entry.target.id + '"]');
                if (!link || !entry.isIntersecting) return;
                nav.querySelectorAll("a").forEach(function (item) {
                  item.classList.remove("is-active");
                });
                link.classList.add("is-active");
              });
            },
            {
              rootMargin: "-15% 0px -70% 0px",
              threshold: [0, 1]
            }
          );

          headings.forEach(function (heading, index) {
            if (index === 0) {
              var first = nav.querySelector('[data-target="' + heading.id + '"]');
              if (first) first.classList.add("is-active");
            }
            outlineObserver.observe(heading);
          });
        }

        function renderSequence() {
          var section = document.querySelector(".markdown-section");
          if (!section) return;
          var existing = section.querySelector(".page-sequence");
          if (existing) existing.remove();

          var path = getCurrentPath();
          var index = pageOrder.findIndex(function (page) {
            return page.path === path;
          });
          if (index === -1) return;

          var previous = pageOrder[index - 1];
          var next = pageOrder[index + 1];
          if (!previous && !next) return;

          var container = document.createElement("nav");
          container.className = "page-sequence";
          container.setAttribute("aria-label", "Page navigation");

          function buildCard(direction, page) {
            if (!page) return "";
            return [
              '<a class="page-sequence__card" href="#' + page.path + '">',
              '<span class="page-sequence__direction">' + direction + "</span>",
              '<span class="page-sequence__title">' + page.label + "</span>",
              '<span class="page-sequence__description">' + page.description + "</span>",
              "</a>"
            ].join("");
          }

          container.innerHTML = buildCard("Previous", previous) + buildCard("Next", next);
          section.appendChild(container);
        }

        function syncTopbarState() {
          var path = getCurrentPath();
          document.querySelectorAll(".topbar__nav [data-nav-path]").forEach(function (link) {
            link.classList.toggle("active", link.getAttribute("data-nav-path") === path);
          });
        }

        function syncDocumentTitle() {
          var path = getCurrentPath();
          var page = pageOrder.find(function (item) {
            return item.path === path;
          });
          document.title = page ? page.label + " | Drift Control Handbook" : "Drift Control Handbook";
        }

        window.$docsify = {
          name: "Drift Control Handbook",
          nameLink: "#/README",
          homepage: "README.md",
          loadSidebar: true,
          relativePath: false,
          autoHeader: true,
          subMaxLevel: 2,
          maxLevel: 4,
          auto2top: true,
          themeColor: "#147d73",
          search: {
            paths: "auto",
            depth: 4,
            placeholder: "Search concepts, sections, and terms",
            noData: "No matching section"
          },
          plugins: [
            function (hook) {
              hook.ready(function () {
                ensureThemeToggle();
                normalizeTopbarNav();
                ensureCopyButtonObserver();
                normalizeCopyButtons();
                syncTopbarState();
                syncDocumentTitle();
              });

              hook.doneEach(function () {
                ensureThemeToggle();
                normalizeTopbarNav();
                syncTopbarState();
                syncDocumentTitle();
                window.setTimeout(function () {
                  normalizeTopbarNav();
                  renderMermaid();
                  normalizeCopyButtons();
                  renderOutline();
                  renderSequence();
                }, 50);
                window.setTimeout(normalizeTopbarNav, 300);
                window.setTimeout(normalizeTopbarNav, 1000);
                window.setTimeout(normalizeCopyButtons, 300);
                window.setTimeout(normalizeCopyButtons, 1000);
              });
            }
          ]
        };

        window.addEventListener("resize", renderOutline);
        window.addEventListener("hashchange", function () {
          syncTopbarState();
          syncDocumentTitle();
        });
      })();
    </script>
    <script src="//cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  </body>
</html>
