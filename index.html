<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta
      name="description"
      content="Standalone drift-control guide for external repos."
    >
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    >
    <title>Drift Control Packet</title>
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    >
    <style>
      :root {
        --theme-color: #0f766e;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "Drift Control Packet",
        homepage: "README.md",
        loadSidebar: true,
        relativePath: true,
        subMaxLevel: 3,
        auto2top: true,
        search: {
          paths: "auto",
          placeholder: "Search this guide",
          noData: "No matching section",
        },
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  </body>
</html>
